<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Esp32 BLE Disruption Module</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF2E93;
      --secondary: #00F0FF;
      --dark-bg: #0A0A0B;
      --panel-bg: #141416;
      --text-main: #FFFFFF;
      --text-muted: #8F9098;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: var(--dark-bg);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(10, 10, 11, 0.9), rgba(10, 10, 11, 0.9)),
        repeating-linear-gradient(45deg, #000 0, #000 2px, transparent 2px, transparent 8px);
    }

    .main-wrapper {
      width: 100%;
      max-width: 500px;
      padding: 2rem;
    }

    .app-container {
      background-color: var(--panel-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .app-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin: 0;
    }

    .selection-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .radio-box {
      position: relative;
      display: block;
      cursor: pointer;
    }

    .radio-box input[type="radio"] {
      position: absolute;
      opacity: 0;
    }

    .box-content {
      padding: 1.2rem;
      border: 2px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.2s ease;
      position: relative;
      z-index: 1;
    }

    .radio-box:hover .box-content {
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
    }

    .radio-box input[type="radio"]:checked+.box-content {
      border-color: var(--secondary);
      background: rgba(0, 240, 255, 0.05);
    }

    .title {
      font-weight: 700;
      display: block;
      margin-bottom: 0.25rem;
      color: var(--text-main);
    }

    .desc {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .flash-action {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .invisible {
      display: none !important;
    }

    /* Override the default web-install-button styling if possible */
    esp-web-install-button {
      --esp-tools-button-color: var(--text-main);
      --esp-tools-button-background-color: var(--primary);
      --esp-tools-button-border-radius: 6px;
    }

    .help-panel {
      margin-top: 2.5rem;
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      font-size: 0.85rem;
      border-left: 3px solid var(--text-muted);
    }

    .help-panel h3 {
      margin: 0 0 1rem 0;
      font-size: 1rem;
      color: var(--text-main);
      font-weight: 500;
    }

    .help-panel p {
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .help-panel ul {
      color: var(--text-muted);
      padding-left: 1.2rem;
      margin: 0;
    }

    .help-panel li {
      margin-bottom: 0.4rem;
    }

    .help-panel a {
      color: var(--secondary);
      text-decoration: none;
    }

    .help-panel a:hover {
      text-decoration: underline;
    }
  </style>
  <script type="module" src="https://unpkg.com/esp-web-tools@8.0.1/dist/web/install-button.js?module"></script>
</head>

<body>

  <div class="main-wrapper">
    <div class="app-container">
      <header>
        <h1>Module Flasher</h1>
        <p class="subtitle">Select variant to initialize</p>
      </header>

      <div class="selection-group">
        <label class="radio-box">
          <input type="radio" name="boardType" value="Ble1">
          <div class="box-content">
            <span class="title">Standard Edition (VSPI)</span>
            <span class="desc">Requires Single NRF24L01 on SCK:18 MISO:19 MOSI:23 CS:21 CE:22</span>
          </div>
        </label>

        <label class="radio-box">
          <input type="radio" name="boardType" value="Ble3">
          <div class="box-content">
            <span class="title">Alternative IO (HSPI)</span>
            <span class="desc">Requires Single NRF24L01 on SCK:14 MISO:12 MOSI:13 CS:15 CE:16</span>
          </div>
        </label>

        <label class="radio-box">
          <input type="radio" name="boardType" value="Ble2">
          <div class="box-content">
            <span class="title">Pro Edition (Dual Array)</span>
            <span class="desc">Utilizes twinned NRF24L01 units on both VSPI and HSPI clusters</span>
          </div>
        </label>
      </div>

      <div class="flash-action">
        <esp-web-install-button class="invisible" id="installer-btn"></esp-web-install-button>
      </div>

      <div class="help-panel">
        <h3>Connection Issues?</h3>
        <p>If your serial port isn't detected:</p>
        <ul>
          <li>Verify USB data cable integrity (not power-only).</li>
          <li>Ensure module indicators are illuminated.</li>
          <li>Install bridge drivers if necessary: <br>
            <a href="https://www.silabs.com/developers/usb-to-uart-bridge-vcp-drivers" target="_blank">CP2102 Driver</a>
            |
            <a href="https://github.com/nodemcu/nodemcu-devkit/tree/master/Drivers" target="_blank">CH341 Driver</a>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('input[name="boardType"]').forEach(radio =>
      radio.addEventListener("change", () => {
        const btn = document.getElementById('installer-btn');
        btn.manifest = `web/manifest_${radio.value}.json`;
        btn.classList.remove('invisible');
      })
    );
  </script>
</body>

</html>
